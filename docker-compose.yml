services:
  api:
    build:
      context: .
    command: uv run uvicorn hydra.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      HYDRA_DATABASE_URL: postgresql+psycopg://hydra:hydra@postgres:5432/hydra
      HYDRA_REDIS_URL: redis://redis:6379/0
      HYDRA_LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hydra
      POSTGRES_USER: hydra
      POSTGRES_PASSWORD: hydra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydra -d hydra"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:

