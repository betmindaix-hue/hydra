name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run Black
        run: uv run black --check .

      - name: Run Mypy
        run: uv run mypy src tests tools

      - name: Run Pytest
        env:
          COVERAGE_FILE: ${{ runner.temp }}/.coverage-ci
        run: uv run pytest

      - name: Validate Alembic configuration
        run: uv run python tools/validate_alembic.py

      - name: Run developer workstation checks
        run: uv run python tools/check_developer_workstation.py

      - name: Run repository security baseline checks
        run: uv run python tools/check_repository_security.py

      - name: Run release readiness checks
        run: uv run python tools/check_release_readiness.py

      - name: Run operations readiness checks
        run: uv run python tools/check_operations_readiness.py

      - name: Build Docker image
        run: docker build -t hydra-ci .
